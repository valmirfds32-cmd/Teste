<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Desenhar sobre a Câmera</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        /* Container principal */
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* Vídeo da câmera (fundo) */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* Canvas para o desenho (sobreposto) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            touch-action: none; /* Impede o scroll da tela ao desenhar */
        }
        /* Barra de ferramentas */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 50px;
            align-items: center;
        }
        input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }
        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active {
            background: #ff6b81;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        
        <canvas id="canvas"></canvas>
        
        <div id="controls">
            <input type="color" id="colorPicker" value="#00ffcc">
            <button id="clearBtn">Limpar</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const clearBtn = document.getElementById('clearBtn');

        // Ajusta o tamanho do canvas para o tamanho real da tela
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Configurações iniciais do traço (precisam ser refeitas ao mudar o tamanho)
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        // Inicia a câmera traseira do celular
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }, // 'environment' prioriza a câmera traseira
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert('Erro ao acessar a câmera: ' + err.message);
            }
        }

        // Lógica do Desenho (Touch Events para Celular)
        let isDrawing = false;

        function getTouchPos(touchEvent) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: touchEvent.touches[0].clientX - rect.left,
                y: touchEvent.touches[0].clientY - rect.top
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const pos = getTouchPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            e.preventDefault(); // Evita comportamentos estranhos do navegador
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const pos = getTouchPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
            ctx.beginPath();
        });

        // Atualiza a cor do pincel quando o usuário escolhe outra
        colorPicker.addEventListener('input', (e) => {
            ctx.strokeStyle = e.target.value;
        });

        // Limpa a tela
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Inicialização
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initCamera();
    </script>
</body>
</html>
