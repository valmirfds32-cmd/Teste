<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sobreposição de Imagem - Câmera Travada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* Vídeo da câmera (fundo base) */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* Container que vai sofrer o Zoom e Movimento */
        #transform-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform-origin: 0 0;
            pointer-events: none;
        }
        /* Imagem carregada pelo usuário */
        #overlay-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.5;
            display: none;
        }
        /* Área invisível no topo que captura os gestos */
        #gesture-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            touch-action: none;
        }
        /* Barra de ferramentas (base) */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 50px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Painel para o controle de opacidade (topo) */
        #opacity-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #opacity-panel input[type="range"] {
            width: 120px;
            accent-color: #00ffcc;
        }
        #fileInput {
            display: none;
        }
        .btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .btn-reset {
            background: #ffa502;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        
        <div id="transform-container">
            <img id="overlay-img" alt="Referência">
        </div>
        
        <div id="gesture-area"></div>
        
        <div id="opacity-panel">
            <label for="opacitySlider">Transparência:</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div id="controls">
            <label class="btn" for="fileInput">Abrir Imagem</label>
            <input type="file" id="fileInput" accept="image/*">
            <button id="resetBtn" class="btn btn-reset">Resetar Posição</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const fileInput = document.getElementById('fileInput');
        const overlayImg = document.getElementById('overlay-img');
        const transformContainer = document.getElementById('transform-container');
        const gestureArea = document.getElementById('gesture-area');
        const opacityPanel = document.getElementById('opacity-panel');
        const opacitySlider = document.getElementById('opacitySlider');
        const resetBtn = document.getElementById('resetBtn');

        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let start = { x: 0, y: 0 };
        let isPanning = false;
        let initDist = 0;

        // Inicia a câmera tentando fixar os parâmetros físicos dela
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        // Solicitamos uma resolução ideal fixa para o navegador não ficar reajustando
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                // Tenta aplicar controles avançados após o vídeo iniciar (Funciona melhor no Chrome/Android)
                video.onloadedmetadata = async () => {
                    const track = stream.getVideoTracks()[0];
                    const capabilities = track.getCapabilities ? track.getCapabilities() : {};
                    
                    // Configurações para tentar travar o foco e evitar o "pulsar" da imagem
                    const advancedConstraints = {};
                    
                    if (capabilities.focusMode && capabilities.focusMode.includes('manual')) {
                        advancedConstraints.focusMode = 'manual';
                    } else if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                        // Se não puder manual, deixamos fixo, mas a maioria dos Androids aceita travar
                        advancedConstraints.focusMode = 'continuous';
                    }

                    // Remove qualquer zoom digital nativo da própria câmera, se houver suporte
                    if (capabilities.zoom) {
                        advancedConstraints.zoom = 1;
                    }

                    if (Object.keys(advancedConstraints).length > 0) {
                        try {
                            await track.applyConstraints({ advanced: [advancedConstraints] });
                            console.log("Trava de foco/zoom aplicada com sucesso.");
                        } catch (e) {
                            console.log("O aparelho rejeitou a trava estrita de hardware:", e);
                        }
                    }
                };

            } catch (err) {
                alert('Erro ao acessar a câmera: ' + err.message);
            }
        }

        // Carrega a imagem
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    overlayImg.src = event.target.result;
                    overlayImg.style.display = 'block';
                    opacityPanel.style.display = 'flex';
                    resetTransform();
                };
                reader.readAsDataURL(file);
            }
        });

        // Controle de Transparência
        opacitySlider.addEventListener('input', function(e) {
            overlayImg.style.opacity = e.target.value;
        });

        function updateTransform() {
            transformContainer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }

        function resetTransform() {
            scale = 1;
            pointX = 0;
            pointY = 0;
            updateTransform();
        }

        resetBtn.addEventListener('click', resetTransform);

        // --- LÓGICA DE GESTOS (TOUCH) ---
        function getDistance(t1, t2) {
            return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        }

        gestureArea.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                isPanning = true;
                start = { x: e.touches[0].clientX - pointX, y: e.touches[0].clientY - pointY };
            } else if (e.touches.length === 2) {
                isPanning = false;
                initDist = getDistance(e.touches[0], e.touches[1]);
            }
        });

        gestureArea.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (isPanning && e.touches.length === 1) {
                pointX = e.touches[0].clientX - start.x;
                pointY = e.touches[0].clientY - start.y;
                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = getDistance(e.touches[0], e.touches[1]);
                const factor = dist / initDist;
                scale *= factor;
                if (scale < 0.1) scale = 0.1;
                if (scale > 10) scale = 10;
                initDist = dist;
                updateTransform();
            }
        });

        gestureArea.addEventListener('touchend', function(e) {
            if (e.touches.length === 0) {
                isPanning = false;
            } else if (e.touches.length === 1) {
                isPanning = true;
                start = { x: e.touches[0].clientX - pointX, y: e.touches[0].clientY - pointY };
            }
        });

        initCamera();
    </script>
</body>
</html>
