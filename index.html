<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sobreposição de Imagem com Zoom</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* Vídeo da câmera (fundo base) */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* Container que vai sofrer o Zoom e Movimento */
        #transform-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform-origin: 0 0; /* Origem do zoom no canto superior esquerdo para o cálculo manual */
            pointer-events: none; /* Permite que o toque passe para a área de captura global */
        }
        /* Imagem carregada pelo usuário */
        #overlay-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.5;
            display: none;
        }
        /* Área invisível no topo que captura os gestos de arrastar e zoom */
        #gesture-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            touch-action: none; /* Bloqueia o zoom nativo do navegador */
        }
        /* Barra de ferramentas (base) */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 50px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Painel para o controle de opacidade (topo) */
        #opacity-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #opacity-panel input[type="range"] {
            width: 120px;
            accent-color: #00ffcc;
        }
        #fileInput {
            display: none;
        }
        .btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .btn-reset {
            background: #ffa502;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        
        <div id="transform-container" id="transformContainer">
            <img id="overlay-img" alt="Referência">
        </div>
        
        <div id="gesture-area" id="gestureArea"></div>
        
        <div id="opacity-panel" id="opacityPanel">
            <label for="opacitySlider">Transparência:</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div id="controls">
            <label class="btn" for="fileInput">Abrir Imagem</label>
            <input type="file" id="fileInput" accept="image/*">
            <button id="resetBtn" class="btn btn-reset">Resetar Posição</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const fileInput = document.getElementById('fileInput');
        const overlayImg = document.getElementById('overlay-img');
        const transformContainer = document.getElementById('transform-container');
        const gestureArea = document.getElementById('gesture-area');
        const opacityPanel = document.getElementById('opacity-panel');
        const opacitySlider = document.getElementById('opacitySlider');
        const resetBtn = document.getElementById('resetBtn');

        // Estado da imagem (Posição e Zoom)
        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let start = { x: 0, y: 0 };
        let isPanning = false;
        let initDist = 0; // Distância inicial do gesto de pinça

        // Inicia a câmera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert('Erro ao acessar a câmera: ' + err.message);
            }
        }

        // Carrega a imagem
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    overlayImg.src = event.target.result;
                    overlayImg.style.display = 'block';
                    opacityPanel.style.display = 'flex';
                    resetTransform();
                };
                reader.readAsDataURL(file);
            }
        });

        // Controle de Transparência
        opacitySlider.addEventListener('input', function(e) {
            overlayImg.style.opacity = e.target.value;
        });

        // Aplica as transformações de CSS (Apenas mover e dar zoom, sem rotação)
        function updateTransform() {
            transformContainer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }

        function resetTransform() {
            scale = 1;
            pointX = 0;
            pointY = 0;
            updateTransform();
        }

        resetBtn.addEventListener('click', resetTransform);

        // --- LÓGICA DE GESTOS (TOUCH) ---

        // Calcula a distância entre dois dedos
        function getDistance(t1, t2) {
            return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        }

        gestureArea.addEventListener('touchstart', function(e) {
            e.preventDefault();
            
            if (e.touches.length === 1) {
                // Arrastar com um dedo
                isPanning = true;
                start = { x: e.touches[0].clientX - pointX, y: e.touches[0].clientY - pointY };
            } else if (e.touches.length === 2) {
                // Zoom com dois dedos (Pinça)
                isPanning = false;
                initDist = getDistance(e.touches[0], e.touches[1]);
            }
        });

        gestureArea.addEventListener('touchmove', function(e) {
            e.preventDefault();
            
            if (isPanning && e.touches.length === 1) {
                // Move a imagem baseado no arrasto
                pointX = e.touches[0].clientX - start.x;
                pointY = e.touches[0].clientY - start.y;
                updateTransform();
            } else if (e.touches.length === 2) {
                // Calcula o novo zoom proporcionalmente à distância dos dedos
                const dist = getDistance(e.touches[0], e.touches[1]);
                const factor = dist / initDist;
                
                // Aplica o fator de escala de forma suave
                scale *= factor;
                
                // Limita o zoom para não sumir e nem travar o navegador
                if (scale < 0.1) scale = 0.1;
                if (scale > 10) scale = 10;
                
                initDist = dist; // Atualiza a distância de referência
                updateTransform();
            }
        });

        gestureArea.addEventListener('touchend', function(e) {
            if (e.touches.length === 0) {
                isPanning = false;
            } else if (e.touches.length === 1) {
                // Se tirou um dedo mas deixou o outro, retoma o arrasto suavemente
                isPanning = true;
                start = { x: e.touches[0].clientX - pointX, y: e.touches[0].clientY - pointY };
            }
        });

        initCamera();
    </script>
</body>
</html>
